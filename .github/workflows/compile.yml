name: Build All LuaDec Versions (GCC)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ['5.1', '5.2', '5.3']

    steps:
      # 1. 拉取程式碼（升級至 Node.js 24 最新相容版）
      - name: Checkout code
        uses: actions/checkout@v4.3.0
        with:
          submodules: 'recursive'

      # 2. 配置 Windows 內建的 MinGW (GCC) 編譯環境
      - name: Setup MinGW
        uses: egor-tisin/setup-gcc@v1
        with:
          version: 'latest'

      # 3. 先編譯對應版本的基底 Lua 依賴庫
      - name: Build Lua Dependency
        run: |
          cd lua-${{ matrix.lua-version }}
          make generic

      # 4. 編譯 LuaDec 本體並輸出為執行檔
      - name: Compile LuaDec
        run: |
          cd luadec
          make LUAVER=${{ matrix.lua-version }}
          
      # 5. 整理並重命名產出的執行檔
      - name: Organize Executables
        run: |
          mkdir -p output_bin
          cp luadec/luadec.exe output_bin/luadec${{ matrix.lua-version }}.exe

      # 6. 打包上傳
      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: luadec-all-windows-executables
          path: output_bin/*
