name: Build All LuaDec Versions

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ['5.1', '5.2', '5.3']

    steps:
      # 1. 升級至支援 Node.js 24 的 v4.2+ 版本
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: 'recursive'

      # 2. 升級至支援 VS2026/Node.js 24 的最新 v3 版本
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      # 3. 核心修復：在編譯前，強行將舊版的 .sln 升級轉譯為新版編譯器可讀的格式
      - name: Upgrade Solution File
        run: |
          devenv vcproj-${{ matrix.lua-version }}\luadec.sln /upgrade

      # 4. 執行編譯
      - name: Compile LuaDec ${{ matrix.lua-version }}
        run: |
          msbuild vcproj-${{ matrix.lua-version }}\luadec.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

      - name: Rename executable for safety
        run: |
          mv bin/luadec.exe bin/luadec${{ matrix.lua-version }}.exe

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: luadec-all-windows-executables
          path: bin/luadec${{ matrix.lua-version }}.exe
