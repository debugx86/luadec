name: Build All LuaDec Versions (Native MSYS2)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ['5.1', '5.2', '5.3']

    steps:
      # 1. 拉取原始碼
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          submodules: 'recursive'

      # 2. 核心修復：直接呼叫微軟 Windows 內建的 msys2 環境，強行把 gcc 加入系統路徑
      - name: Add MSYS2 GCC to PATH
        run: |
          echo "C:\msys64\mingw64\bin" >> $GITHUB_PATH
          echo "C:\msys64\usr\bin" >> $GITHUB_PATH

      # 3. 測試 GCC 能否正常運作
      - name: Verify GCC
        run: |
          gcc --version
          make --version

      # 4. 編譯對應版本的 Lua 基底依賴庫
      - name: Build Lua Dependency
        run: |
          cd lua-${{ matrix.lua-version }}
          make generic

      # 5. 編譯 LuaDec 本體並輸出執行檔
      - name: Compile LuaDec
        run: |
          cd luadec
          make LUAVER=${{ matrix.lua-version }}
          
      # 6. 整理並重新命名執行檔
      - name: Organize Executables
        run: |
          mkdir output_bin
          cp luadec/luadec.exe output_bin/luadec${{ matrix.lua-version }}.exe

      # 7. 打包上傳
      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: luadec-all-windows-executables
          path: output_bin/*
